# Sample render.yaml for Render automatic deploy
# Replace <YOUR-REPO> with your repository info if needed.

services:
  - type: web
    name: vehicle-inspection
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ROBOFLOW_API_KEY
        sync: false
      - key: ROBOFLOW_MODEL_ID
        sync: false

# Notes:
# - Add this file to your repo and push to GitHub. On Render, choose "Create from render.yaml".
# - Set the ROBOFLOW_API_KEY and ROBOFLOW_MODEL_ID in Render dashboard after service creation.
